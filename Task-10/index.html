<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>SoleMate</title>
</head>

<body>

    <header id="header">
        <div class="logo">SoleMate</div>
        <div class="header-right">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search for products...">
            </div>
            <div class="nav-links">
                <div class="cart">
                    <img id="cart-btn" src="./assets/shopping-cart.svg" alt="checkout">
                </div>
            </div>
        </div>
    </header>

    <aside id="sidebar">
        <div class="categories">
            <h2>Categories</h2>

            <button class="filter-btn active" data-category="all">All</button>

            <button class="filter-btn" data-category="beauty">Beauty</button>
            <button class="filter-btn" data-category="fragrances">Fragrances</button>
            <button class="filter-btn" data-category="skin-care">Skin Care</button>
            <button class="filter-btn" data-category="sunglasses">Sunglasses</button>
            <button class="filter-btn" data-category="tops">Tops</button>
            <button class="filter-btn" data-category="womens-bags">Women's Bags</button>
            <button class="filter-btn" data-category="womens-dresses">Women's Dresses</button>
            <button class="filter-btn" data-category="womens-jewellery">Women's Jewellery</button>
            <button class="filter-btn" data-category="womens-shoes">Women's Shoes</button>
            <button class="filter-btn" data-category="womens-watches">Women's Watches</button>
            <button class="filter-btn" data-category="home-decoration">Home Decoration</button>
            <button class="filter-btn" data-category="furniture">Furniture</button>
            <button class="filter-btn" data-category="laptops">Laptops</button>
            <button class="filter-btn" data-category="smartphones">Smartphones</button>
            <button class="filter-btn" data-category="mobile-accessories">Mobile Accessories</button>
            <button class="filter-btn" data-category="mens-shirts">Men's Shirts</button>
            <button class="filter-btn" data-category="mens-shoes">Men's Shoes</button>
            <button class="filter-btn" data-category="mens-watches">Men's Watches</button>
            <button class="filter-btn" data-category="motorcycle">Motorcycle</button>
            <button class="filter-btn" data-category="sports-accessories">Sports Accessories</button>
            <button class="filter-btn" data-category="tablets">Tablets</button>
            <button class="filter-btn" data-category="vehicle">Vehicle</button>
            <button class="filter-btn" data-category="kitchen-accessories">Kitchen Accessories</button>
            <button class="filter-btn" data-category="groceries">Groceries</button>

        </div>

        </div>


    </aside>

    <main id="main-content">
        <div id="product-section">
            <h1>Shop Now</h1>
            <div id="product-container" class="products-list"></div>
        </div>

        <div id="cart-section">
            <button id="back-btn">← Back to Shop</button>
            <h1>Your Cart</h1>
            <div id="cart-items"></div>
            <div id="total"></div>
        </div>
    </main>

    <footer>
        <div class="footer-top">
            <div class="logo">SoleMate</div>
            <div class="footer_links">
                <a><img src="./assets/instagram.svg" alt="instagram" class="icon contact"></a>
                <a><img src="./assets/facebook.svg" alt="facebook" class="icon contact"> </a>
                <a><img src="./assets/mail.svg" alt="mail" class="icon contact"> </a>
                <a><img src="./assets/phone.svg" alt="phone" class="icon contact"> </a>
            </div>
        </div>
        <hr>
        <div class="footer-bottom">&copy; 2026 SoleMate. All rights reserved</div>
    </footer>

    <script type="module" src="script.js"></script>
</body>

</html>
