<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>SoleMate</title>
</head>

<body>

    <header id="header">
        <div class="logo">SoleMate</div>
        <nav>
            <ul class="nav__links">
                <li><a href="#">Home</a></li>
                <li><a href="#men">Men</a></li>
                <li><a href="#women">Women</a></li>
                <li><a href="#kids">Kids</a></li>
            </ul>
        </nav>
    </header>

    <aside>
        <a><img src="./assets/home.svg" alt="home" class="icon"></a>
        <a><img src="./assets/trending-up.svg" alt="trendy" class="icon"> </a>
        <a><img src="./assets/heart.svg" alt="heart" class="icon"> </a>
        <a><img src="./assets/package.svg" alt="package" class="icon"> </a>
        <a><img src="./assets/shopping-cart.svg" alt="cart" class="icon"> </a>


    </aside>


    <main>
        <h1>Shop Now</h1>
        <div class="full-img" id="fullImgBox">
            <img src="./assets/shoe1.avif" alt="shoe-img" id="fullImg">
            <span onclick="closeFullImg()">X</span>
        </div>
        <div class="products-list">
            <div class="product">
                <img src="./assets/shoe1.avif" alt="shoe-img">
                <p>Kanso ZE: Blue</p>
            </div>
            <div class=" product">
                <img src="./assets/shoe2.avif" alt="shoe-img">
                <p>UBZ FLY: Off White</p>
            </div>
            <div class=" product">
                <img src="./assets/shoe3.avif" alt="shoe-img">
                <p>Kanso ZE: Black</p>
            </div>
            <div class="product">
                <img src="./assets/shoe4.avif" alt="shoe-img">
                <p>Fumes NX: Driftwood</p>
            </div>
            <div class="product">
                <img src="./assets/shoe5.avif" alt="shoe-img">
                <p>Fumes NX: Storm</p>
            </div>
            <div class="product">
                <img src="./assets/shoe6.avif" alt="shoe-img">
                <p>UBZ FLY: Beige</p>
            </div>
            <div class="product">
                <img src="./assets/shoe7.avif" alt="shoe-img">
                <p>Urban Blaze: Latte</p>
            </div>
            <div class="product">
                <img src="./assets/shoe8.avif" alt="shoe-img">
                <p>Urban Blaze: Butter</p>
            </div>
            <div class="product">
                <img src="./assets/shoe9.avif" alt="shoe-img">
                <p>Urban Blaze: Hawkins</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-top">
            <div class="logo">SoleMate</div>
            <div class="footer_links">
                <a><img src="./assets/instagram.svg" alt="instagram" class="icon contact"></a>
                <a><img src="./assets/facebook.svg" alt="facebook" class="icon contact"> </a>
                <a><img src="./assets/mail.svg" alt="mail" class="icon contact"> </a>
                <a><img src="./assets/phone.svg" alt="phone" class="icon contact"> </a>
            </div>
        </div>
        <hr>
        <div class="footer-bottom">&copy; 2026 SoleMate. All rights reserved</div>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
